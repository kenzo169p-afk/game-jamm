<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legado Verde</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui-layer">
            <div id="top-bar">
                <div id="time-display">
                    <span id="month-text">Mês 1</span> - <span id="time-left">5h 00m</span> restantes
                </div>
                <div id="inventory-display">
                    Sementes: <span id="seed-count">0</span> | Ferramentas: <span id="tool-count">0</span>
                </div>
                <div id="control-buttons">
                    <button id="pause-btn">Pausar</button>
                    <button id="menu-btn">Menu</button>
                </div>
            </div>
            
            <div id="dialogue-box" class="hidden">
                <p id="dialogue-text"></p>
                <button id="dialogue-next" class="hidden">Avançar [Espaço]</button>
            </div>
        </div>
        
        <div id="start-screen" class="screen">
            <h1>Legado Verde</h1>
            <button id="start-btn">Iniciar Reflorestamento</button>
        </div>

        <div id="menu-overlay" class="screen hidden">
            <h2>Menu</h2>
            <button id="resume-btn">Retomar Jogo</button>
            <button id="objectives-btn">Objetivos</button>
            <button id="reset-btn" style="background: #e74c3c; border-color: #c0392b;">Resetar Progresso</button>
        </div>

        <div id="objectives-overlay" class="screen hidden">
            <h2>Progresso</h2>
            <div id="objectives-list">
                <p>Título: <span id="player-title" style="color: #f1c40f;">Visitante</span></p>
                <p>Árvores Adultas: <span id="trees-count">0</span> / 20</p>
                <ul style="list-style: none; padding: 10px; text-align: left; font-size: 14px;">
                    <li>🌱 Iniciante: 5 árvores</li>
                    <li>🌿 Semi Profissional: 12 árvores</li>
                    <li>🌳 Profissional: 20 árvores</li>
                </ul>
            </div>
            <button id="objectives-back-btn">Voltar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
